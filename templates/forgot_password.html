{% extends "base.html" %}

{% block title %}Forgot Password — Scholaris{% endblock %}

{% block content %}

<div class="container" style="max-width:520px; padding-top:64px;">

    <div class="card card-elevated fade-up">
        <div class="card-body p-4 p-md-5">

            <div class="text-center mb-4">
                <h2 class="page-title" style="font-size:1.6rem;">Reset your password</h2>
                <p class="text-ink-mute" style="font-size:0.9rem;">
                    Enter your email address and we'll send you a reset link.
                </p>
            </div>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="you@example.com"
                            required
                        >
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary">
                        Send reset link
                    </button>
                </div>

            </form>

            <div class="divider"></div>

            <div class="text-center">
                <a href="{{ url_for('login') }}" class="text-decoration-none text-accent">
                    <i class="bi bi-arrow-left"></i> Back to login
                </a>
            </div>

        </div>
    </div>

</div>

{% endblock %}
