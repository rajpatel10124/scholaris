{% extends "base.html" %}
{% block title %}Verify Email — Scholaris{% endblock %}
{% block content %}

<style>
    .otp-wrap { max-width: 420px; margin: 80px auto; padding: 0 16px; }
    .otp-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; text-align: center; }
    .otp-title { font-family: var(--font-serif); font-size: 1.7rem; color: var(--ink); margin-bottom: 8px; }
    .otp-sub { font-size: 0.875rem; color: var(--ink-mute); margin-bottom: 28px; line-height: 1.6; }
    .otp-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; }
    .otp-digit {
        width: 52px; height: 60px; font-size: 1.5rem; font-family: var(--font-mono); font-weight: 700;
        text-align: center; border: 2px solid var(--surface-3); border-radius: var(--radius-sm);
        background: var(--surface); color: var(--ink); outline: none; transition: all 0.18s;
    }
    .otp-digit:focus { border-color: var(--accent); background: var(--white); box-shadow: 0 0 0 3px rgba(91,94,244,0.12); }
    .resend-row { margin-top: 16px; font-size: 0.83rem; color: var(--ink-mute); }
    .resend-btn { background: none; border: none; color: var(--accent); font-weight: 600; cursor: pointer; font-size: 0.83rem; padding: 0; }
    .resend-btn:disabled { color: var(--ink-mute); cursor: default; }
    #resendTimer { font-family: var(--font-mono); }
</style>

<div class="otp-wrap fade-up">
    <div class="otp-card">
        <div style="background:var(--accent-3);width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
            <i class="bi bi-envelope-check-fill" style="font-size:1.5rem;color:var(--accent);"></i>
        </div>
        <h1 class="otp-title">Verify your email</h1>
        <p class="otp-sub">
            We sent a 6-digit code to<br>
            <strong style="color:var(--ink);">{{ email|default('your email address') }}</strong><br>
            Code expires in <strong>10 minutes</strong>.
        </p>

        <form method="POST" id="otpForm">
            <div class="otp-inputs" id="otpInputs">
                {% for i in range(6) %}
                <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"
                       id="otp{{ i }}" name="otp{{ i }}" autocomplete="one-time-code">
                {% endfor %}
            </div>
            <input type="hidden" name="otp_code" id="otpCode">

            <button type="submit" class="btn-primary w-100" style="padding:12px;font-size:0.95rem;" onclick="assembleOTP()">
                Verify Email <i class="bi bi-arrow-right ms-1"></i>
            </button>
        </form>

        <div class="resend-row">
            Didn't receive it?
            <button class="resend-btn" id="resendBtn" onclick="resendOTP()" disabled>
                Resend in <span id="resendTimer">60</span>s
            </button>
        </div>
    </div>
</div>

<script>
// Auto-advance OTP input
const inputs = document.querySelectorAll('.otp-digit');
inputs.forEach((inp, i) => {
    inp.addEventListener('input', e => {
        const v = e.target.value.replace(/\D/g, '');
        e.target.value = v.slice(-1);
        if (v && i < inputs.length - 1) inputs[i+1].focus();
    });
    inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !e.target.value && i > 0) inputs[i-1].focus();
    });
    inp.addEventListener('paste', e => {
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'');
        [...pasted].slice(0, 6).forEach((ch, j) => {
            if (inputs[i+j]) inputs[i+j].value = ch;
        });
        e.preventDefault();
    });
});

function assembleOTP() {
    const code = [...inputs].map(i => i.value).join('');
    document.getElementById('otpCode').value = code;
}

// Resend countdown
let seconds = 60;
const timerEl = document.getElementById('resendTimer');
const btn = document.getElementById('resendBtn');
const t = setInterval(() => {
    seconds--;
    timerEl.textContent = seconds;
    if (seconds <= 0) {
        clearInterval(t);
        btn.disabled = false;
        btn.textContent = 'Resend code';
    }
}, 1000);

function resendOTP() {
    window.location.href = '{{ url_for("resend_otp") }}';
}
</script>

{% endblock %}
